# ============================================================
# MedQLoRA — Master Configuration
# QLoRA Fine-tuning of Llama 3.1 8B for Medical Q&A
# Hardware: Apple Silicon Mac Mini 24GB Unified Memory
# Framework: MLX-LM (Apple's native LLM library)
# ============================================================

model:
  # HuggingFace model ID — pre-quantized 4-bit for Apple Silicon
  # Switched to Llama 3.1 8B for fresh training run.
  name: "mlx-community/Meta-Llama-3.1-8B-Instruct-4bit"
  # IMPORTANT: The `mlx-community/*-4bit` repos are MLX-format weights and are
  # not directly loadable by PyTorch/Transformers on Linux (HF Spaces).
  # For Spaces live inference (Transformers backend), use the official HF model id:
  hf_name_linux: "meta-llama/Meta-Llama-3.1-8B-Instruct"
  # Previous fast starter model:
  # name: "mlx-community/Llama-3.2-3B-Instruct-4bit"
  # Fallback ungated option (no HF token required):
  # name: "mlx-community/Mistral-7B-Instruct-v0.3-4bit"
  max_seq_length: 768    # reduced for safer 8B training on 24GB unified memory
  # System prompt injected before every user message
  system_prompt: >
    You are an expert medical AI assistant. Answer medical questions accurately,
    concisely, and with appropriate clinical detail. When uncertain, say so clearly.
    Do not provide personal medical advice — always recommend consulting a healthcare provider.

lora:
  # LoRA rank — controls expressivity vs parameter count
  # r=16 trains 0.8% of total parameters, good quality/speed balance
  r: 16
  # LoRA scaling factor (alpha/r = 1.0 keeps updates at original scale)
  alpha: 16
  dropout: 0.05
  # Target all linear projection layers for best medical domain adaptation
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  # Number of transformer layers to apply LoRA to (from the top).
  # Use a POSITIVE int — mlx_lm.lora's --num-layers does not safely accept -1
  # (passing -1 caused NaN losses in an earlier run). 16 is mlx_lm's tested default.
  # Llama 3.2 3B has 28 transformer layers; 16 covers the top half.
  lora_layers: 16

training:
  batch_size: 1
  # Effective batch = batch_size * gradient_accumulation = 8
  gradient_accumulation: 8
  # Number of validation mini-batches per eval pass (set high for stable val estimate)
  val_batches: 100
  learning_rate: 1.0e-4   # was 2.0e-4 — lowered after a NaN explosion at 2e-4 with no warmup
  lr_scheduler: "cosine"
  warmup_steps: 100
  epochs: 3
  # Save adapter checkpoint every N steps
  save_every: 250
  # Validate every N steps
  val_every: 250
  # Generate sample completions every N steps (for W&B logging)
  generate_every: 250
  # Max tokens to generate during sample generation
  max_new_tokens: 256
  # Output directory for adapter weights
  output_dir: "adapters_8b_fresh"
  # Early stopping patience (in validation steps, 0 = disabled)
  early_stopping_patience: 0

data:
  train_file: "data/train.jsonl"
  val_file: "data/val.jsonl"
  eval_file: "data/eval.jsonl"
  # Fraction of training data to use as validation
  val_split: 0.10
  # Random seed for reproducible splits
  seed: 42
  # Maximum number of training examples (null = use all)
  max_train_examples: null
  # Datasets to merge for training
  train_datasets:
    - id: "medalpaca/medical_meadow_medqa"
      split: "train"
      format: "qa"          # {question, answer}
    - id: "medalpaca/medical_meadow_wikidoc"
      split: "train"
      format: "instruction"  # {instruction, input, output}
  # Evaluation-only dataset (NEVER used in training)
  eval_dataset:
    id: "qiaojin/PubMedQA"
    config: "pqa_labeled"
    split: "train"           # PubMedQA only has train split; we use subset for eval
    format: "pubmedqa"       # {question, context, final_decision}
    # Number of examples to evaluate (null = all labeled ~1000)
    num_eval_examples: 500

hardware:
  framework: "mlx"
  dtype: "bfloat16"

evaluation:
  # Scores file paths (auto-created by eval scripts)
  baseline_scores_file: "evaluation/baseline_scores.json"
  finetuned_scores_file: "evaluation/finetuned_scores.json"
  # PubMedQA answer choices
  answer_choices: ["yes", "no", "maybe"]
  # Temperature for evaluation generation (low = deterministic)
  temperature: 0.1
  top_p: 0.9

logging:
  # Set to true if you have a W&B account + WANDB_API_KEY in .env
  use_wandb: true
  wandb_project: "medqlora"
  wandb_entity: null  # null = use default entity
  # Always log to local file regardless of W&B
  local_log_file: "training/training_log.jsonl"

inference:
  # Path to adapter weights (set after training completes)
  adapter_path: "adapters_8b_fresh"
  # FastAPI server settings
  api_host: "0.0.0.0"
  api_port: 8000
  # Generation defaults for inference
  temperature: 0.7
  top_p: 0.9
  max_new_tokens: 512

export:
  # Your HuggingFace username/repo-name
  # Set HF_TOKEN in .env before running push_to_hub.py
  hub_model_id: "your-username/medqlora-llama-3.1-8b"
  push_adapter_only: true  # push only ~150MB adapters, not full 16GB model
