# ============================================================
# TechMojo HR Assistant — Master Configuration
# QLoRA Fine-tuning of Llama 3.1 8B on TechMojo internal HR policies.
#
# Hardware: Apple Silicon Mac Mini 24GB Unified Memory
# Framework: MLX-LM (Apple) for training; Transformers + PEFT (Linux/HF Space) for serving.
# Source dataset: PranavTM/LeavePolicy on HuggingFace (117 examples)
# ============================================================

model:
  # ── Model identifiers per backend ──────────────────────────────────────────
  # `name` is the MLX-quantized 4-bit repo, used for **training** on Apple
  # Silicon and for **local** inference via mlx-lm. It is NOT loadable by
  # PyTorch/Transformers on Linux.
  #
  # `hf_name_linux` is the standard PyTorch repo, used for **HF Space serving**
  # via Transformers + PEFT. We point it at NousResearch's re-publish so the
  # Space doesn't need a HF token / gated-model approval. The weights are
  # identical to Meta's official Llama-3.1-8B-Instruct.
  name: "mlx-community/Meta-Llama-3.1-8B-Instruct-4bit"
  hf_name_linux: "NousResearch/Meta-Llama-3.1-8B-Instruct"

  max_seq_length: 768

  # ── System prompts ────────────────────────────────────────────────────────
  # `system_prompt` MUST stay aligned with the prompt used during training
  # (in data/prepare_dataset.py — every training example bakes this exact
  # text in as the system message). Changing it at inference time degrades
  # the model's recall of memorized policies.
  #
  # `base_system_prompt` is what the **base** model in side-by-side mode
  # sees — deliberately generic, no mention of TechMojo. Same user question,
  # only the fine-tuned model has been told what TechMojo is and trained on
  # its policies.
  system_prompt: >
    You are an HR assistant at TechMojo. Answer employee questions about
    TechMojo's internal HR policies — leave, sabbatical, referrals,
    payroll documents, manager escalation paths — accurately and concisely.
    If a question is not covered by TechMojo's policies, say so clearly
    rather than inventing a plausible-sounding answer.

  base_system_prompt: >
    You are a helpful AI assistant. Answer the user's question accurately
    and honestly. If the user asks about a specific company, organization,
    internal tool, or proprietary policy that you do not have verified
    information about, say so clearly and avoid inventing details.

lora:
  r: 16
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  # Llama 3.1 8B has 32 transformer layers; 16 covers the top half.
  # Must be a positive int — mlx_lm.lora's --num-layers does not safely accept
  # values <= 0 (caused NaN losses in an earlier run).
  lora_layers: 16

training:
  batch_size: 1
  gradient_accumulation: 8
  # Small dataset (~100 train examples), so we lean on epochs to get enough
  # gradient steps. ~100 / 8 ≈ 12 effective steps per epoch × 30 epochs ≈
  # 360 optimizer updates.
  epochs: 30
  val_batches: 17
  learning_rate: 1.0e-4
  lr_scheduler: "cosine"
  warmup_steps: 30
  save_every: 50
  val_every: 50
  generate_every: 50
  max_new_tokens: 200
  output_dir: "adapters_techmojo"
  early_stopping_patience: 0

data:
  train_file: "data/train.jsonl"
  val_file: "data/val.jsonl"
  eval_file: "data/eval.jsonl"
  source_dataset: "PranavTM/LeavePolicy"
  source_file: "techmojo_leave_policy_finetune.jsonl"
  raw_file: "data/techmojo/raw.jsonl"
  eval_fraction: 0.15
  seed: 42

hardware:
  framework: "mlx"
  dtype: "bfloat16"

evaluation:
  baseline_scores_file: "evaluation/baseline_scores.json"
  finetuned_scores_file: "evaluation/finetuned_scores.json"
  temperature: 0.2
  top_p: 0.9
  max_new_tokens: 200

logging:
  use_wandb: false
  wandb_project: "techmojo-hr"
  wandb_entity: null
  local_log_file: "training/training_log.jsonl"

inference:
  # ── Adapter directories ───────────────────────────────────────────────────
  # `adapter_path` is the MLX-format adapter served on Apple Silicon via mlx-lm.
  # `adapter_path_linux` is the PEFT-format adapter served on Linux/Spaces via
  # Transformers + PEFT. The PEFT version is generated from the MLX one by
  # tools/convert_mlx_to_peft.py — same weights, key names renamed to PEFT's
  # convention, plus an adapter_config.json with the LoRA hyperparameters.
  adapter_path: "adapters_techmojo_best"
  adapter_path_linux: "adapters_techmojo_best_peft"
  api_host: "0.0.0.0"
  api_port: 8000
  temperature: 0.3
  top_p: 0.9
  max_new_tokens: 300

export:
  hub_model_id: "Firstminer/techmojo-hr-llama-3.1-8b"
  push_adapter_only: true
